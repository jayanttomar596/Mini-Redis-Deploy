services:
  - type: web
    name: mini-redis-dashboard
    runtime: node
    plan: free
    buildCommand: cd MiniRedis && make app && cd ../web-dashboard && npm install --omit=dev
    startCommand: cd web-dashboard && MINI_REDIS_AUTOSTART=1 node server.js
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: MINI_REDIS_HOST
        value: 127.0.0.1
      - key: MINI_REDIS_PORT
        value: 8080
      - key: MINI_REDIS_AUTOSTART
        value: 1
